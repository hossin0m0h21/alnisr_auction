<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدردشة - ALNISR Auction</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .chat-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .chat-header { background: var(--primary-color); color: white; padding: 15px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { background: var(--bg-color); height: 400px; overflow-y: auto; padding: 15px; border: 1px solid var(--border-color); }
        .message { margin: 10px 0; padding: 10px 15px; border-radius: 15px; max-width: 70%; }
        .message.sent { background: var(--primary-color); color: white; margin-left: auto; }
        .message.received { background: var(--card-bg); }
        .message-time { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; }
        .chat-input { display: flex; gap: 10px; padding: 15px; background: var(--card-bg); border-radius: 0 0 10px 10px; }
        .chat-input input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 20px; }
        .chat-input button { padding: 12px 25px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2 data-ar="الدردشة" data-en="Chat">الدردشة</h2>
            <button class="lang-toggle" onclick="toggleLanguage()">EN</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" data-ar="اكتب رسالة..." data-en="Type a message..." placeholder="اكتب رسالة...">
            <button class="btn-primary" onclick="sendChatMessage()" data-ar="إرسال" data-en="Send">إرسال</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        let currentUser = null;
        
        async function initChat() {
            const saved = localStorage.getItem('alnisrCurrentUser');
            if (saved) currentUser = JSON.parse(saved);
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            await loadChatMessages();
            initWebSocket();
            startChatPolling();
        }
        
        async function loadChatMessages() {
            try {
                const res = await fetch(`/api/messages?userId=${currentUser.id}&auctionId=${window._currentAuction?.id || ''}`);
                const messages = await res.json();
                const container = document.getElementById('chat-messages');
                container.innerHTML = messages.map(m => `
                    <div class="message ${m.senderId === currentUser.id ? 'sent' : 'received'}">
                        <div class="message-sender">${m.senderName}</div>
                        <div class="message-content">${m.content}</div>
                        <div class="message-time">${new Date(m.createdAt).toLocaleString()}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error('Chat error:', e);
            }
        }
        
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const content = input.value.trim();
            if (!content) return;
            
            try {
                await fetch('/api/messages/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        senderId: currentUser.id,
                        senderName: currentUser.fullname,
                        auctionId: window._currentAuction?.id,
                        content
                    })
                });
                input.value = '';
                await loadChatMessages();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        function startChatPolling() {
            setInterval(loadChatMessages, 5000);
        }
        
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });
        
        applyLang();
        initChat();
    </script>
</body>
</html>
